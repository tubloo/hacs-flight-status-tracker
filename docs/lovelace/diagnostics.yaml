type: vertical-stack
cards:
  - type: custom:mushroom-title-card
    title: Diagnostics
    subtitle: API usage, travel activity, active provider, and quick actions

  - type: grid
    columns: 4
    square: false
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_api_calls_today
        name: Daily API Calls
        icon: mdi:calendar-today
        icon_color: green

      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_api_calls_this_month
        name: Monthly API Calls
        icon: mdi:calendar-month
        icon_color: blue

      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_api_calls_this_year
        name: Yearly API Calls
        icon: mdi:calendar
        icon_color: amber

      - type: custom:mushroom-template-card
        primary: Lifetime API Calls
        secondary: "{{ states('sensor.flight_status_tracker_api_calls') }} calls"
        icon: mdi:api
        icon_color: teal
        tap_action:
          action: more-info
          entity: sensor.flight_status_tracker_api_calls

  - type: custom:mushroom-title-card
    title: Travel Activity
    subtitle: Flights tracked and total route distance

  - type: grid
    columns: 4
    square: false
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_flights_today
        name: Flights Today
        icon: mdi:airplane-clock
        icon_color: green

      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_flights_this_month
        name: Flights This Month
        icon: mdi:airplane-calendar
        icon_color: blue

      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_flights_this_year
        name: Flights This Year
        icon: mdi:airplane-check
        icon_color: amber

      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_flights_lifetime
        name: Flights Lifetime
        icon: mdi:airplane
        icon_color: teal

      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_distance_today
        name: Distance Today
        icon: mdi:map-marker-distance
        icon_color: green

      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_distance_this_month
        name: Distance This Month
        icon: mdi:map-marker-distance
        icon_color: blue

      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_distance_this_year
        name: Distance This Year
        icon: mdi:map-marker-distance
        icon_color: amber

      - type: custom:mushroom-entity-card
        entity: sensor.flight_status_tracker_distance_lifetime
        name: Distance Lifetime
        icon: mdi:map-marker-distance
        icon_color: teal

  - type: statistics-graph
    title: Daily API Trend (14d)
    chart_type: line
    period: day
    days_to_show: 14
    stat_types:
      - sum
    entities:
      - sensor.flight_status_tracker_api_calls_today

  - type: statistics-graph
    title: Monthly API Trend (12mo)
    chart_type: line
    period: month
    days_to_show: 365
    stat_types:
      - sum
    entities:
      - sensor.flight_status_tracker_api_calls_this_month

  - type: statistics-graph
    title: Daily Flights Trend (14d)
    chart_type: line
    period: day
    days_to_show: 14
    stat_types:
      - sum
    entities:
      - sensor.flight_status_tracker_flights_today

  - type: statistics-graph
    title: Monthly Flights Trend (12mo)
    chart_type: line
    period: month
    days_to_show: 365
    stat_types:
      - sum
    entities:
      - sensor.flight_status_tracker_flights_this_month

  - type: statistics-graph
    title: Daily Distance Trend (14d)
    chart_type: line
    period: day
    days_to_show: 14
    stat_types:
      - sum
    entities:
      - sensor.flight_status_tracker_distance_today

  - type: statistics-graph
    title: Monthly Distance Trend (12mo)
    chart_type: line
    period: month
    days_to_show: 365
    stat_types:
      - sum
    entities:
      - sensor.flight_status_tracker_distance_this_month

  - type: custom:mushroom-template-card
    primary: Active Provider Summary
    secondary: >
      {% set provider = state_attr('sensor.flight_status_tracker_api_calls','provider') or 'unknown' %}
      {% set flows = state_attr('sensor.flight_status_tracker_api_calls','provider_flows') or {} %}
      {{ provider | title }} ·
      schedule {{ flows.get('schedule', 0) }} ·
      status {{ flows.get('status', 0) }} ·
      position {{ flows.get('position', 0) }} ·
      directory {{ flows.get('directory', 0) }}
    icon: mdi:chart-donut
    icon_color: indigo
    tap_action:
      action: more-info
      entity: sensor.flight_status_tracker_api_calls

  - type: entities
    title: Controls
    show_header_toggle: false
    entities:
      - entity: sensor.flight_status_tracker_upcoming_flights
        name: Upcoming flights (summary)
      - entity: button.flight_status_tracker_refresh_now
        name: Refresh now
      - entity: button.flight_status_tracker_remove_landed
        name: Remove landed flights
      - entity: button.flight_status_tracker_refresh_directory
        name: Refresh airport/airline directory data
